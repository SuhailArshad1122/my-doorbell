name: Doorbell

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: Doorbell PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenClaw CLI
        run: npm install -g openclaw

      - name: Ring Doorbell (Run OpenClaw Review)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Fetch PR diff
          PR_DIFF=$(gh pr diff ${{ github.event.pull_request.number }})

          # Run OpenClaw agent to review the code changes
          REVIEW_OUTPUT=$(openclaw agent --local --message "Review the following PR git diff for bugs. Be brief: name the bug, say why it is wrong, and stop. Refer to specific commits by short hash when explaining what changed:

          $PR_DIFF")

          # Post the review comment on the PR
          gh pr comment ${{ github.event.pull_request.number }} --body "$REVIEW_OUTPUT"
