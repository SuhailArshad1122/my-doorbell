name: Doorbell

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: Doorbell PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenClaw CLI
        run: npm install -g openclaw

      - name: Ring Doorbell (Run PR Review)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCLAW_GATEWAY_URL: ${{ secrets.OPENCLAW_GATEWAY_URL }}
          OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Fallback key when local PC is OFF
        run: |
          PR_DIFF=$(gh pr diff ${{ github.event.pull_request.number }})
          PROMPT="Review the following PR git diff for bugs. Be brief: name the bug, say why it is wrong, and stop. Refer to specific commits by short hash:

          $PR_DIFF"

          echo "🔔 Doorbell rung! Checking if local OpenClaw Gateway is online..."

          # Try connecting to local OpenClaw Gateway first
          if [ -n "$OPENCLAW_GATEWAY_URL" ] && openclaw health --url "$OPENCLAW_GATEWAY_URL" --timeout 5 >/dev/null 2>&1; then
            echo "✅ Local OpenClaw is ONLINE! Routing review to local NemoClaw..."
            REVIEW_OUTPUT=$(openclaw agent --url "$OPENCLAW_GATEWAY_URL" --token "$OPENCLAW_TOKEN" --message "$PROMPT")
          else
            echo "⚠️ Local OpenClaw is OFFLINE (PC switched off). Falling back to OpenClaw runner..."
            REVIEW_OUTPUT=$(openclaw agent --local --message "$PROMPT")
          fi

          # Post the review comment back to the PR
          gh pr comment ${{ github.event.pull_request.number }} --body "$REVIEW_OUTPUT"
